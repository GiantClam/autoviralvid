name: UI Render E2E

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: UI E2E scenario to run
        required: true
        default: openclaw
        type: choice
        options:
          - openclaw
          - product-ad
          - knowledge-edu

jobs:
  ui-openclaw:
    name: UI Render Remotion E2E (${{ inputs.scenario }})
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install uv
        run: pip install uv

      - name: Install Python browser tooling
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        run: |
          cd agent
          uv sync --frozen

      - name: Run UI render E2E
        run: npm run test:ui:${{ inputs.scenario }}

      - name: Upload UI screenshots
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ui-${{ inputs.scenario }}-screenshots
          path: test_outputs/ui_${{ inputs.scenario }}
          if-no-files-found: ignore
