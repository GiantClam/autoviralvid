name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  encoding-hygiene:
    name: Encoding Hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check UTF-8 and mojibake
        run: python scripts/check_encoding_hygiene.py

  frontend:
    name: Frontend (Lint & Build)
    runs-on: ubuntu-latest
    needs: [encoding-hygiene]
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

  backend:
    name: Backend (Tests)
    runs-on: ubuntu-latest
    needs: [encoding-hygiene]
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Verify ffmpeg
        run: ffmpeg -version

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run python -m pytest tests/ -v --tb=short
        env:
          AUTH_SECRET: ci-test-secret
          SUPABASE_URL: https://fake.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: fake-key

  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5

      - name: Build frontend image
        run: docker build -f Dockerfile.frontend -t autoviralvid-frontend:ci .

      - name: Build backend image
        run: docker build -f Dockerfile.backend -t autoviralvid-backend:ci .
